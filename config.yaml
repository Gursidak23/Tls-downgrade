# TLS Downgrade & Cipher Suite Analyzer for IoT Devices
# =====================================================
# Research-aligned configuration based on:
#   - Cho et al., "Return of Version Downgrade Attack in the Era of TLS 1.3" (CoNEXT 2020)
#   - RFC 8446 (TLS 1.3 downgrade sentinel), RFC 7507 (FALLBACK_SCSV)

# ── Network Discovery ────────────────────────────────────────
# Find IoT devices exposing TLS services on your local network
discovery:
  subnet: "192.168.1.0/24"
  ports: [443, 8443, 8080, 4443, 9443]
  timeout: 2
  max_threads: 50

# ── Mode 1: IoT Device as Server ─────────────────────────────
# Probe IoT devices acting as TLS servers (web UIs, APIs)
# Tests: version support, cipher suite selection, downgrade protections
server_targets:
  - host: "192.168.1.100"
    port: 443
    label: "IP Camera"
  - host: "192.168.1.101"
    port: 443
    label: "NAS Device"
  - host: "192.168.1.102"
    port: 8443
    label: "Smart Hub"

# ── Mode 2: IoT Device as Client (Paper 1 methodology) ──────
# Test whether IoT client TLS stacks validate downgrade protections
client_test:
  # Mode A: Malicious server that omits the downgrade sentinel
  malicious_server:
    listen_port: 4433
    duration: 120           # seconds to wait per scenario
    scenarios:
      - "sentinel_omission"   # Core test: omit RFC 8446 sentinel
      - "sentinel_present"    # Control: include sentinel (should pass)
      - "weak_cipher_offer"   # Secondary: offer only broken ciphers

  # Mode B: MITM proxy that rewrites version + strips sentinel
  mitm_proxy:
    listen_port: 8443
    target_host: "api.vendor-cloud.com"  # Real server the IoT device connects to
    target_port: 443
    downgrade_to: "TLSv1.0"             # or TLSv1.1, TLSv1.2
    duration: 120

# ── Automated Client Stack Testing (Paper 1 methodology) ─────
# Tests multiple TLS client libraries for sentinel validation.
# Replicates Cho et al. (CoNEXT 2020) browser testing but for IoT TLS stacks.
automated_testing:
  listen_port: 14500
  scenarios:
    - "sentinel_present"     # Core: does client check sentinel?
    - "sentinel_omission"    # Control: sentinel stripped by MITM
    - "downgrade_to_10"      # Paper demonstrated TLS 1.3 → 1.0
    - "downgrade_to_11"      # Intermediate downgrade

# ── Virtual IoT Lab (No Hardware Required) ────────────────────
# Runs the full analysis pipeline against software-emulated IoT devices.
# Each profile replicates a real device's TLS configuration.
virtual_lab:
  base_port: 17000            # Starting port for virtual IoT servers
  stacks_port: 17100          # Port for client stack sentinel testing
  phases:
    server_scan: true         # Phase 1: Version/cipher/downgrade probing
    profile_experiment: true  # Phase 2: Modern/Mixed/Legacy cipher preference
    client_stacks: true       # Phase 3: Sentinel validation (Paper 1)

# ── Scanning parameters ──────────────────────────────────────
scan:
  timeout: 10
  retries: 2
  delay: 0.5

# ── Output ────────────────────────────────────────────────────
output:
  results_dir: "sample_results"
  verbose: true

# ── Dashboard ─────────────────────────────────────────────────
dashboard:
  host: "127.0.0.1"
  port: 5000
  debug: true
